#this one at ~/.config/kitty/kitty.conf

# ── font ────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
italic_font      auto
bold_font        auto
bold_italic_font auto
font_size        10.0
adjust_line_height  110%
adjust_column_width 0
disable_ligatures   never

# ── cursor ──────────────────────────────────────
cursor                  #ff6b35
cursor_text_color       #0c0c0c
cursor_shape            beam
cursor_beam_thickness   1.8
cursor_blink_interval   0.5
cursor_stop_blinking_after 10.0

# ── scrollback ──────────────────────────────────
scrollback_lines 10000
wheel_scroll_multiplier 5.0

# ── mouse ───────────────────────────────────────
mouse_hide_wait 2.0
click_interval  0.5
focus_follows_mouse no

# ── performance ─────────────────────────────────
repaint_delay    8
input_delay      2
sync_to_monitor  yes

# ── terminal bell ───────────────────────────────
enable_audio_bell no
visual_bell_duration 0.0

# ── window layout ───────────────────────────────
remember_window_size   yes
initial_window_width   900
initial_window_height  580
window_padding_width   3
window_padding_height  2
hide_window_decorations yes
placement_strategy      center

# ── color scheme · Power ────────────────────────
background            #0c0c0c
foreground            #e0e0e0
selection_background  #ff6b35
selection_foreground  #0c0c0c

# black
color0  #1a1a1a
color8  #555555

# red → Power orange
color1  #ff6b35
color9  #ff9f68

# green → muted sage
color2  #7a9e7e
color10 #a3c9a8

# yellow → warm sand
color3  #d4a373
color11 #eacda3

# blue → steel grey
color4  #6b7a8f
color12 #9aacbf

# magenta → soft lavender
color5  #9b7ede
color13 #bfa5f3

# cyan → dark teal
color6  #5e8b7e
color14 #8dbbae

# white
color7  #b0b0b0
color15 #f5f5f5

# ── tab bar ─────────────────────────────────────
tab_bar_edge            bottom
tab_bar_style           powerline
tab_powerline_style     slanted
tab_bar_min_tabs        2
tab_title_template      " {title} "
active_tab_foreground   #0c0c0c
active_tab_background   #ff6b35
active_tab_font_style   bold
inactive_tab_foreground #888888
inactive_tab_background #1a1a1a
inactive_tab_font_style normal
tab_bar_background      #0c0c0c

# ── transparency & blur ─────────────────────────
background_opacity      0.7
background_blur         7
dynamic_background_color no

# ── urls ────────────────────────────────────────
url_color               #ff9f68
url_style               curly
open_url_with           default
detect_urls             yes

# ── keybindings ─────────────────────────────────
clear_all_shortcuts no
map ctrl+c    copy_to_clipboard
map ctrl+v    paste_from_clipboard
map ctrl+shift+equal    change_font_size all +1.0
map ctrl+shift+minus    change_font_size all -1.0
map ctrl+shift+0        change_font_size all 0
map ctrl+shift+up       scroll_line_up
map ctrl+shift+down     scroll_line_down
map ctrl+shift+page_up   scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+t    new_tab_with_cwd
map ctrl+n    new_window
map ctrl+w    close_window
map ctrl+right    next_tab
map ctrl+left     previous_tab
