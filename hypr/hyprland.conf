exec-once = hyprpaper
exec-once = waybar
#basic stuff ya know

bind = SUPER, Space, exec, wofi --show drun
bind = SUPER, R, exec, wofi --show run
bind = ALT, Tab, exec, wofi --show window

# preferences for wofi, you can customise on ur own 
#just remember to add ~/.config/wofi/config and ~/.config/wofi/style.css

bind = SUPER, L, exec, hyprlock

#now the decorations

    general {
	gaps_in = 6
	gaps_out = 12
	float_gaps = 0
	border_size = 2
	col.active_border =  rgba(ff6b35ee) rgba(ff9f68aa) 45deg
	col.inactive_border = rgba(333333aa)
	resize_on_border = true
	layout = dwindle
	allow_tearing = true
	modal_parent_blocking = false
}

    decoration {
	rounding = 1
	rounding_power = 3
	active_opacity = 0.9
	inactive_opacity = 0.5
	fullscreen_opacity = 1

    shadow {
        enabled = true
        range = 10
        render_power = 3
        color = rgba(1a1a1aee)
	sharp = false
    }

    blur {
        enabled = true
        size = 8
        passes = 1
	ignore_opacity = true
	new_optimizations = true
	xray = true
	contrast = 1
	brightness = 1
	vibrancy_darkness = 0.5

        vibrancy = 0.1696
    }
}


    animations {
	enabled = yes
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     5,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, slide top
    animation = windowsOut,    1,     1.49,  linear,       slide bottom
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, slide
    animation = layersOut,     1,     1.5,   linear      , slide
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     2,  almostLinear, slide
    animation = workspacesIn,  1,     2,  almostLinear, slidevert
    animation = workspacesOut, 1,     2,  almostLinear, slide
    animation = zoomFactor,    1,     7,     quick
}

    dwindle {
	force_split = 0
	preserve_split = true
	smart_split = false
        smart_resizing = true
        permanent_direction_override = false
        special_scale_factor = 1
        split_width_multiplier = 1.0
        use_active_for_splits = true
        default_split_ratio = 1.0
        split_bias = 0
        precise_mouse_move = false

	}

    master {
	new_status = master
	}


    misc {
	force_default_wallpaper = 0
	disable_hyprland_logo = true 
	}

    input {
	kb_layout = fr, ara 
	kb_model = fr
	kb_options =grp:alt_shift_toggle
	#add 'kb_file' path to set your own settings later
	follow_mouse = 1
	sensitivity = 0 
	force_no_accel = 0
	accel_profile = flat

touchpad {
    natural_scroll = true
    tap-to-click = true
    scroll_factor = 0.3
    disable_while_typing = true
    clickfinger_behavior = true
    middle_button_emulation = true
    drag_lock = true
    tap-and-drag = true
}
}
  device {
    name = imps/2-logitech-wheel-mouse 
    sensitivity = 0
}

    opengl {
  # for the annoying flicker when you use some damn uncompatible stuff
	nvidia_anti_flicker = true 
	}

# the next key binds are personal preferences
# also there's something for french keyboard owners

$mainMod = SUPER 

bind = $mainMod, A, exec, $terminal
bind = $mainMod, Q, killactive,
bind = SUPER, L, exec, hyprlock
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, Z, togglefloating,
bind = $mainMod, R, exec, wofi --show run
bind = $mainMod, Space, exec, wofi --show drun
bind = $mainMod, F, exec, firefox
bind = $mainMod, D, exec, discord
bind = $mainMod, B, exec, foliate
# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
# screen shot settings
bind = ,      Print,        exec, grim ~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png
bind = SHIFT, Print,        exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png
bind = CTRL,  Print,        exec, grim -g "$(slurp)" - | wl-copy
# we use codes the binary value code if you have french keyboard like me (azerty keyboard)
bind = $mainMod, code:10, workspace, 1
bind = $mainMod, code:11, workspace, 2
bind = $mainMod, code:12, workspace, 3
bind = $mainMod, code:13, workspace, 4
bind = $mainMod, code:14, workspace, 5
bind = $mainMod, code:15, workspace, 6
bind = $mainMod, code:16, workspace, 7
bind = $mainMod, code:17, workspace, 8
bind = $mainMod, code:18, workspace, 9
bind = $mainMod, code:19, workspace, 10
# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, code:10, movetoworkspace, 1
bind = $mainMod SHIFT, code:11, movetoworkspace, 2
bind = $mainMod SHIFT, code:12, movetoworkspace, 3
bind = $mainMod SHIFT, code:13, movetoworkspace, 4
bind = $mainMod SHIFT, code:14, movetoworkspace, 5
bind = $mainMod SHIFT, code:15, movetoworkspace, 6
bind = $mainMod SHIFT, code:16, movetoworkspace, 7
bind = $mainMod SHIFT, code:17, movetoworkspace, 8
bind = $mainMod SHIFT, code:18, movetoworkspace, 9
bind = $mainMod SHIFT, code:19, movetoworkspace, 10

# SPECIAL WORKSPACE SETTINGS
# if you still dont know the shift basically switches the window to the place you switched to
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# SCROLLING THROUGH WORKSPACES with the mouse ball that rolls
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# WINDOW RESIZING
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# PLAYERS FOR MUSIC AND WTV
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
